<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- App CSS -->
  <link rel="stylesheet" href="/styles/layout.css" type="text/css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <script src="./scripts/client.js"></script>
  


   <title>Done For Today</title>
</head>
<body>
  <div class="container">
    <h1>Important Items Only</h1>
    <div class="app">
      <div id="days" class="box">

        <div id="today" class="window">
          <div class="window-title">
          <h2><span>Today</span><a href=""><i class="fa-solid fa-plus"></i></a></h2>
          <hr>
        </div>
          <div class="window-content">
          <div class="today-group">
            <ul class="incomplete">
            </ul>
            <ul class="complete">            
            </ul>
          </div>
        </div>
        </div>

        <div id="tomorrow" class="window">
          <h2><span>Tomorrow</span><a href=""><i class="fa-solid fa-plus"></i></a></h2>
          <hr>
          <ul>
          </ul>
        </div>
        <div id="day-after" class="window">
          <h2><span>The Day After</span><a href=""><i class="fa-solid fa-plus"></i></a></h2>
          <hr>
        <ul>
        </ul>
      </div>
      </div>
      <div id="buckets" class="box">
        <div id="opportunities" class="window">
          <h2><span>Opportunities</span><a href=""><i class="fa-solid fa-plus"></i></a></h2>
          <hr>
          <ul>
          </ul>
        </div>
        <div id="recurring" class="window">
          <h2><span>Recurring Tasks</span><a href=""><i class="fa-solid fa-plus"></i></a></h2>
          <hr>
          <ul>
          </ul>
        </div>
      </div>
    </div>   
  </div>  
</body>
